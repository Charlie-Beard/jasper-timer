<style>
  :root {
    --bg: #FBF6E7;          /* cream — fixed, never changes with phase */
    --track: #EFE7D2;
    --track-edge: #DDD3B8;
    --ink: #4A4438;
    --ink-soft: #8A8168;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Nothing on screen is meant to be selected or copied (Section 5) */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
  }

  html, body { height: 100%; }

  body {
    position: fixed;
    inset: 0;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  main {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 5vmin, 48px);
    padding:
      calc(env(safe-area-inset-top, 0px) + 24px)
      calc(env(safe-area-inset-right, 0px) + 24px)
      calc(env(safe-area-inset-bottom, 0px) + 24px)
      calc(env(safe-area-inset-left, 0px) + 24px);
  }

  #clock {
    font-size: clamp(2.75rem, 10vmin, 6rem);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  /* The single focal element (Section 3) */
  #bar {
    width: min(80vw, 880px);
    height: clamp(64px, 18vmin, 150px);
    background: var(--track);
    border-radius: 999px;
    box-shadow: inset 0 0 0 2px var(--track-edge);
    overflow: hidden;
  }

  #fill {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    transition: width 0.6s ease, background-color 0.6s ease;
  }

  #countdown { text-align: center; }

  #remaining {
    font-size: clamp(1.75rem, 6.5vmin, 3.5rem);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  #until {
    margin-top: 0.25em;
    font-size: clamp(1rem, 3vmin, 1.5rem);
    color: var(--ink-soft);
  }

  /* Once GREEN the countdown is not shown; visibility (not display) keeps the
     bar from shifting position at the 7:00 transition. */
  body.green #countdown { visibility: hidden; }
</style>
</head>
<body>
<main>
  <div id="clock"></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="countdown">
    <div id="remaining"></div>
    <div id="until">until 7:00 AM</div>
  </div>
</main>

<script>
(function () {
  "use strict";

  // Schedule boundaries in minutes since midnight (Section 2). Hardcoded by
  // design — change them by editing here and pushing to main (Section 7.5).
  var RED_FILL_START = 3 * 60; // 03:00 — bar begins filling (clamped to 0% before)
  var YELLOW_START   = 6 * 60; // 06:00 — RED becomes YELLOW
  var GREEN_START    = 7 * 60; // 07:00 — YELLOW becomes GREEN, final until midnight

  // Bright, fully-saturated traffic-light colors (Section 3 / Section 8)
  var COLORS = { red: "#FF0000", yellow: "#FFCC00", green: "#00CC00" };

  var fillEl      = document.getElementById("fill");
  var clockEl     = document.getElementById("clock");
  var remainingEl = document.getElementById("remaining");

  function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

  function render() {
    var now = new Date();
    // Seconds are folded in so the fill advances smoothly between ticks; the
    // phase boundaries land on the same minute marks as the Section 2 pseudocode.
    var mins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

    var phase, fillPct;
    if (mins < YELLOW_START) {
      phase = "red";
      fillPct = clamp((mins - RED_FILL_START) / (YELLOW_START - RED_FILL_START), 0, 1);
    } else if (mins < GREEN_START) {
      phase = "yellow";
      fillPct = (mins - YELLOW_START) / (GREEN_START - YELLOW_START);
    } else {
      phase = "green";
      fillPct = 1;
    }

    fillEl.style.width = (fillPct * 100) + "%";
    fillEl.style.backgroundColor = COLORS[phase];

    // Current time, 12-hour with AM/PM (Section 8 assumption)
    var h = now.getHours();
    var m = now.getMinutes();
    var h12 = h % 12 === 0 ? 12 : h % 12;
    clockEl.textContent = h12 + ":" + (m < 10 ? "0" : "") + m + " " + (h < 12 ? "AM" : "PM");

    // Countdown to 7:00 AM, hidden once GREEN. Rounded up so it never reads
    // "0m" while still YELLOW.
    document.body.classList.toggle("green", phase === "green");
    if (phase !== "green") {
      var minsLeft = Math.ceil(GREEN_START - mins);
      var hLeft = Math.floor(minsLeft / 60);
      var mLeft = minsLeft % 60;
      remainingEl.textContent = hLeft > 0 ? hLeft + "h " + mLeft + "m" : mLeft + "m";
    }
  }

  render();
  setInterval(render, 15000); // live refresh every 15s (Section 4)

  // iOS suspends timers while the web app is backgrounded (e.g. during
  // Netflix); re-render the instant it comes back so it never shows stale info.
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) render();
  });
  window.addEventListener("pageshow", render);
  window.addEventListener("focus", render);

  // Extra guard against pinch zoom — Safari doesn't always honor the viewport meta.
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });
})();
</script>
</body>
</html>
