<style>
  :root {
    --bg: #FBF6E7;          /* cream — fixed, never changes with phase */
    --track: #EFE7D2;
    --track-edge: #DDD3B8;
    --ink: #4A4438;
    --ink-soft: #8A8168;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Nothing on screen is meant to be selected or copied (Section 5) */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
  }

  html, body { height: 100%; }

  body {
    position: fixed;
    inset: 0;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-text-size-adjust: 100%;
    transition: background-color 0.6s ease;
  }

  main {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 5vmin, 48px);
    padding:
      calc(env(safe-area-inset-top, 0px) + 24px)
      calc(env(safe-area-inset-right, 0px) + 24px)
      calc(env(safe-area-inset-bottom, 0px) + 24px)
      calc(env(safe-area-inset-left, 0px) + 24px);
  }

  #clock {
    font-size: clamp(2.75rem, 10vmin, 6rem);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  /* The focal element outside the daytime window */
  #bar {
    width: min(80vw, 880px);
    height: clamp(64px, 18vmin, 150px);
    background: var(--track);
    border-radius: 999px;
    box-shadow: inset 0 0 0 2px var(--track-edge);
    overflow: hidden;
  }

  #fill {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    transition: width 0.6s ease, background-color 0.6s ease;
  }

  /* Daytime illustrations — replace the bar 7:30am–4:15pm. On weekends the
     family scene is joined by a "trip to the cinema" scene, stacked below it. */
  #dayscenes {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vmin, 20px);
  }
  #family, #cinema {
    display: none;
    width: min(82vw, 720px);
    max-height: 55vh;
    height: auto;
  }
  body[data-phase="family"] #bar       { display: none; }
  body[data-phase="family"] #dayscenes { display: flex; }
  body[data-phase="family"] #family    { display: block; }
  body[data-phase="family"][data-weekend="true"] #cinema { display: block; }
  /* Two scenes stacked: cap each so both fit on screen with the clock.
     A definite width (not auto) is required — these SVGs size from viewBox. */
  body[data-phase="family"][data-weekend="true"] #family,
  body[data-phase="family"][data-weekend="true"] #cinema {
    width: min(64vw, 500px);
    max-height: 36vh;
  }

  /* Bedtime illustration — replaces the bar once the 5:15pm lock takes over */
  #bedtime {
    display: none;
    width: min(82vw, 720px);
    max-height: 55vh;
    height: auto;
  }
  body[data-phase="locked"] #bar     { display: none; }
  body[data-phase="locked"] #bedtime { display: block; }

  /* Calm twilight wash for the evening, once the day is done */
  body[data-phase="locked"] { background: #C9CEEA; }

  #countdown { text-align: center; }

  #remaining {
    font-size: clamp(1.75rem, 6.5vmin, 3.5rem);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  #until {
    margin-top: 0.25em;
    font-size: clamp(1rem, 3vmin, 1.5rem);
    color: var(--ink-soft);
    min-height: 1.4em;
  }

  /* No countdown while GREEN or during the daytime illustration; visibility
     (not display) keeps the bar/illustration from shifting position. */
  body[data-phase="green"]  #countdown,
  body[data-phase="family"] #countdown,
  body[data-phase="locked"] #countdown { visibility: hidden; }
</style>

  <div id="countdown">
    <div id="remaining"></div>
    <div id="until"></div>
  </div>
</main>

<script>
(function () {
  "use strict";

  // Schedule boundaries in minutes since midnight. Hardcoded by design —
  // change them by editing here and pushing to main.
  var RED_FILL_START = 3 * 60;        // 03:00 — bar begins filling (clamped to 0% before)
  var YELLOW_START   = 6 * 60;        // 06:00 — RED becomes YELLOW
  var GREEN_START    = 7 * 60;        // 07:00 — YELLOW becomes GREEN
  var FAMILY_START   = 7 * 60 + 30;   // 07:30 — bar is replaced by the family illustration
  var DRAIN_START    = 16 * 60 + 15;  // 16:15 — full BLUE bar appears and starts draining
  var LOCK_TIME      = 17 * 60 + 15;  // 17:15 — bar empty; device Screen Time lock takes over

  // Bright, fully-saturated signal colors
  var COLORS = { red: "#FF0000", yellow: "#FFCC00", green: "#00CC00", blue: "#0080FF" };

  // Optional ?phase= override for previewing any phase's artwork without waiting
  // for that time of day (e.g. ?phase=locked). Invisible in normal use — the
  // live clock stays real; only the bar/illustration/countdown are forced.
  var QS = new URLSearchParams(location.search);
  var OVERRIDE = QS.get("phase");
  // ?weekend=1 / ?weekend=0 forces the weekend (cinema) variant on/off for
  // preview; otherwise the real day of week decides.
  var WEEKEND_OVERRIDE = QS.get("weekend");
  var PREVIEW = {
    red:    { color: COLORS.red,    fillPct: 0.5, cdText: "1h 30m", cdCaption: "until 7:00 AM" },
    yellow: { color: COLORS.yellow, fillPct: 0.5, cdText: "30m",    cdCaption: "until 7:00 AM" },
    green:  { color: COLORS.green,  fillPct: 1,   cdText: "",       cdCaption: "" },
    family: { color: COLORS.green,  fillPct: 1,   cdText: "",       cdCaption: "" },
    blue:   { color: COLORS.blue,   fillPct: 0.5, cdText: "30m",    cdCaption: "until 5:15 PM" },
    locked: { color: COLORS.blue,   fillPct: 0,   cdText: "0m",     cdCaption: "" }
  };

  var fillEl      = document.getElementById("fill");
  var clockEl     = document.getElementById("clock");
  var remainingEl = document.getElementById("remaining");
  var untilEl     = document.getElementById("until");

  function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

  function render() {
   try {
    var now = new Date();
    // Seconds are folded in so the fill moves smoothly between ticks; phase
    // boundaries land on exactly the minute marks above.
    var mins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

    var phase, color, fillPct;
    var cdText = "", cdCaption = "";

    if (mins < YELLOW_START) {
      phase = "red";
      color = COLORS.red;
      fillPct = clamp((mins - RED_FILL_START) / (YELLOW_START - RED_FILL_START), 0, 1);
      cdText = formatHM(Math.ceil(GREEN_START - mins));
      cdCaption = "until 7:00 AM";
    } else if (mins < GREEN_START) {
      phase = "yellow";
      color = COLORS.yellow;
      fillPct = (mins - YELLOW_START) / (GREEN_START - YELLOW_START);
      cdText = formatHM(Math.ceil(GREEN_START - mins));
      cdCaption = "until 7:00 AM";
    } else if (mins < FAMILY_START) {
      phase = "green";
      color = COLORS.green;
      fillPct = 1;
    } else if (mins < DRAIN_START) {
      phase = "family";
      color = COLORS.green; // bar hidden; keeps fill state sane
      fillPct = 1;
    } else if (mins < LOCK_TIME) {
      // Blue bar drains from full at 4:15pm to empty at 5:15pm
      phase = "blue";
      color = COLORS.blue;
      fillPct = 1 - (mins - DRAIN_START) / (LOCK_TIME - DRAIN_START);
      cdText = Math.ceil(LOCK_TIME - mins) + "m"; // 60m … 1m
      cdCaption = "until 5:15 PM";
    } else {
      // After the 5:15pm Screen Time lock: drained bar stays for the evening
      phase = "locked";
      color = COLORS.blue;
      fillPct = 0;
      cdText = "0m";
    }

    // Preview override: force the requested phase's look, keep the real clock.
    if (OVERRIDE && PREVIEW.hasOwnProperty(OVERRIDE)) {
      phase = OVERRIDE;
      color = PREVIEW[OVERRIDE].color;
      fillPct = PREVIEW[OVERRIDE].fillPct;
      cdText = PREVIEW[OVERRIDE].cdText;
      cdCaption = PREVIEW[OVERRIDE].cdCaption;
    }

    // Weekend flag drives the extra cinema scene during the daytime phase.
    var day = now.getDay(); // 0 = Sunday, 6 = Saturday
    var isWeekend = (day === 0 || day === 6);
    if (WEEKEND_OVERRIDE === "1" || WEEKEND_OVERRIDE === "true")  isWeekend = true;
    if (WEEKEND_OVERRIDE === "0" || WEEKEND_OVERRIDE === "false") isWeekend = false;

    document.body.setAttribute("data-phase", phase);
    document.body.setAttribute("data-weekend", isWeekend ? "true" : "false");
    fillEl.style.width = (fillPct * 100) + "%";
    fillEl.style.backgroundColor = color;

    // Current time, 12-hour with AM/PM
    var h = now.getHours();
    var m = now.getMinutes();
    var h12 = h % 12 === 0 ? 12 : h % 12;
    clockEl.textContent = h12 + ":" + (m < 10 ? "0" : "") + m + " " + (h < 12 ? "AM" : "PM");

    remainingEl.textContent = cdText;
    untilEl.textContent = cdCaption;
   } catch (e) {
    // Safety net: this display must never freeze. Swallow any unexpected error
    // so the last good frame stays on screen and the next tick can self-heal.
   }
  }

  // "1h 12m" above an hour, "23m" below; rounded up so it never shows 0
  // while a countdown is still running.
  function formatHM(minsLeft) {
    var hLeft = Math.floor(minsLeft / 60);
    var mLeft = minsLeft % 60;
    return hLeft > 0 ? hLeft + "h " + mLeft + "m" : mLeft + "m";
  }

  render();
  setInterval(render, 15000); // live refresh every 15s

  // iOS suspends timers while the web app is backgrounded (e.g. during
  // Netflix); re-render the instant it comes back so it never shows stale info.
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) render();
  });
  window.addEventListener("pageshow", render);
  window.addEventListener("focus", render);

  // Extra guard against pinch zoom — Safari doesn't always honor the viewport meta.
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); });
})();
</script>
